<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>महर्षि गार्गेय इण्टरमीडिएट कॉलेज — मैनेजमेंट पोर्टल</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f1f5f9; }
        
        /* प्रिंट स्टाइल */
        @media print {
            @page { size: A4 portrait; margin: 10mm; }
            .no-print { display: none !important; }
            .print-grid { display: grid; grid-template-rows: repeat(2, 1fr); height: 275mm; gap: 5mm; }
            .receipt-copy { 
                border: 2px solid #1e3a8a !important; padding: 20px !important; position: relative; 
                background: white !important; height: 135mm; box-sizing: border-box;
            }
            .watermark {
                position: absolute; top: 40%; left: 15%; font-size: 60px; color: rgba(30, 58, 138, 0.08);
                transform: rotate(-30deg); font-weight: bold; pointer-events: none;
            }
        }
    </style>
</head>
<body class="p-4">

    <header class="no-print bg-blue-900 text-white p-6 rounded-2xl shadow-lg mb-6 text-center">
        <h1 class="text-3xl font-bold">महर्षि गार्गेय इण्टरमीडिएट कॉलेज</h1>
        <p class="text-blue-200">फीस प्रबंधन एवं भुगतान पोर्टल</p>
    </header>

    <main id="portalDashboard" class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
        <div id="workspaceGrid" class="hidden">
            <div id="printOverlay" class="hidden print:block print-grid"></div>
            </div>
    </main>

    <script>
        // Updated Receipt Generator for Professional Look
        function generateReceiptHTML(copyType) {
            return `
                <div class="receipt-copy">
                    <div class="watermark">SECURED MGIC</div>
                    <div class="text-center mb-6">
                        <h2 class="text-2xl font-black text-blue-900">महर्षि गार्गेय इण्टरमीडिएट कॉलेज</h2>
                        <p class="text-xs text-slate-500">खरगपुर, महजना, हंडिया, प्रयागराज - 221005</p>
                        <div class="mt-2 inline-block bg-blue-900 text-white text-[10px] px-4 py-1 rounded font-bold uppercase tracking-widest">${copyType}</div>
                    </div>
                    
                    <div class="grid grid-cols-2 text-[12px] gap-2 mb-6 border-b pb-4">
                        <div><strong>नाम:</strong> ${currentStudent["Student Name"]}</div>
                        <div><strong>अनुक्रमांक:</strong> ${currentStudent["Roll No"]}</div>
                        <div><strong>पिता:</strong> ${currentStudent["Father Name"]}</div>
                        <div><strong>कक्षा:</strong> ${currentStudent["Class"]}</div>
                    </div>

                    <table class="w-full text-[11px] mb-6 border">
                        <tr class="bg-blue-800 text-white"><th class="p-2">विवरण</th><th class="p-2">राशि (₹)</th><th class="p-2">दिनांक</th></tr>
                        <tr><td class="p-2 border">फीस भुगतान (किस्त)</td><td class="p-2 border text-center">₹${lastPaymentAmount}</td><td class="p-2 border text-center">${lastTxDate}</td></tr>
                    </table>

                    <div class="flex justify-between items-center mt-auto border-t pt-4">
                        <div class="text-[10px]">अधिकृत हस्ताक्षर<br>काउंटर क्लर्क</div>
                        <div class="text-right text-[10px]">कुल बकाया: ₹${currentStudent["Due"]}</div>
                    </div>
                </div>
            `;
        }

        function printReceipt() {
            const area = document.getElementById("printOverlay");
            area.innerHTML = generateReceiptHTML("छात्र प्रति") + generateReceiptHTML("कार्यालय प्रति");
            window.print();
        }
    </script>
</body>
</html>
